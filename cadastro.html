<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Cantina Escolar</title>
    <link rel="stylesheet" href="cadastro-style.css">
</head>
<body class="cadastro-body">
    
    <div class="cadastro-card">
        <div class="cadastro-header">
            <h2>CANTINA ESCOLAR</h2>
            <P>CRIAR NOVA CONTA DE ADMINISTRADOR</P>
    </div>

    <form id="cadastroForm">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Ex: João Pereira" required>
        </div>
    
        <div class="form-group">
            <label for="email">E-mail Corporativo</label>
            <input type="email" id="email" placeholder="joao@cantina.com" required>
        </div>
    
        <div class="form-group">
            <label for="cargo">Cargo / Função</label>
            <select id="cargo">
                <option value="Operador">Operador de Caixa</option>
                <option value="Administrador">Administrador</option>
            </select>
        </div>
    
        <div class="form-group">
            <label for="senha">Senha de Acesso</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
        </div>
    
        <button type="submit" class="btn-cadastro">Cadastrar Operador</button>
        
        <div class="login-link">
            Já tem uma conta? <a href="login.html">Fazer Login</a>
        </div>
    </form>

    <script>
    document.getElementById('cadastroForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const cargo = document.getElementById('cargo').value;
        const senha = document.getElementById('senha').value;

        // 1. Pega a lista de usuários já existente ou cria uma lista vazia se for o primeiro
        let listaUsuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

        // 2. Evita cadastrar o mesmo e-mail duas vezes
        const emailExiste = listaUsuarios.some(u => u.email.toLowerCase() === email.toLowerCase());
        if (emailExiste) {
            alert('Este e-mail já está cadastrado no sistema!');
            return;
        }

        // 3. Cria o objeto do novo usuário e adiciona na lista
        const novoUsuario = { nome, email, cargo, senha };
        listaUsuarios.push(novoUsuario);
        
        // 4. Salva a lista completa e atualizada de volta no navegador
        localStorage.setItem('usuarios', JSON.stringify(listaUsuarios));

        alert('Usuário cadastrado com sucesso! Redirecionando para o login...');
        window.location.href = 'login.html';
    }); 
    </script>

</body>
</html>
