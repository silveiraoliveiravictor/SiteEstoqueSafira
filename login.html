<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cantina Escolar</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-header">
            <h2>CANTINA ESCOLAR</h2>
            <p>Controle de Estoque • Painel de Acesso</p>
        </div>

        <form id="loginForm" onsubmit="validarLogin(event)">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="ana@cantina.com" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
            
            <div id="erro" class="error-message">E-mail ou senha incorretos!</div>
            <div class="cadastro-link">
            Não tem uma conta? <a href="cadastro.html" style="color: var(--azul-destaque); text-decoration: none; font-weight: 600;">Cadastre-se aqui</a>
        </div>
        </form>
    </div>

    <script>
    function validarLogin(event) {
        event.preventDefault();

        const emailDigitado = document.getElementById('email').value;
        const senhaDigitada = document.getElementById('senha').value;
        const erro = document.getElementById('erro');

        // 1. Pega a lista completa de usuários que salvamos no cadastro
        const listaUsuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

        // 2. Procura na lista se existe alguém com o e-mail e a senha digitados
        const usuarioEncontrado = listaUsuarios.find(u => u.email === emailDigitado && u.senha === senhaDigitada);

        if (usuarioEncontrado) {
            erro.style.display = 'none';

            // 3. Salva os dados de quem acabou de entrar na sessão ativa
            sessionStorage.setItem('usuarioLogado', JSON.stringify(usuarioEncontrado));

            // 4. Redireciona para o painel principal
            window.location.href = 'index.html';
        } else {
            // Se não encontrar ninguém na lista, mostra o aviso vermelho na tela
            erro.style.display = 'block';
        }
    }
    </script>
</body>
</html>
